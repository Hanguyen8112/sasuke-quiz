<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sasuke Academy - Đề 3</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            background-color: #f8fafc;
        }
        .slide-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        /* Ngăn chặn tap highlight trên iOS */
        * { -webkit-tap-highlight-color: transparent; }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .stat-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 0.85rem;
            text-align: center;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 0.25rem;
        }
        .stat-value {
            font-size: 1.35rem;
            font-weight: 800;
            color: #0f172a;
        }
        @media (max-width: 768px) {
            .stats-bar {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const ChevronLeft = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        );
        const ChevronRight = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        );
        const Eye = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const [showAnswer, setShowAnswer] = useState(false);
            const [selectedIdx, setSelectedIdx] = useState(null);
            const [answers, setAnswers] = useState({});

            const slides = [
                { type: 'cover', title: 'BỘ ĐỀ SỐ 3', subtitle: 'Sasuke Academy Kindergarten', org: 'Sasuke Academy' },
                { id: 1, question: 'Nhóm lớp học sinh chuẩn bị tốt nghiệp mầm non của trường mầm non Sasuke là nhóm lớp gì?', options: [{ label: 'A', text: 'Mẫu giáo bé' }, { label: 'B', text: 'Mẫu giáo nhỡ' }, { label: 'C', text: 'Mẫu giáo lớn', isCorrect: true }] },
                { id: 2, question: 'Chữ nào có nét móc 2 đầu?', options: [{ label: 'A', text: 'Chữ t' }, { label: 'B', text: 'Chữ g' }, { label: 'C', text: 'Chữ m', isCorrect: true }] },
                { id: 3, question: 'Chữ cái nào sau đây có nét cong tròn khép kín?', options: [{ label: 'A', text: 'Chữ c' }, { label: 'B', text: 'Chữ ô', isCorrect: true }, { label: 'C', text: 'Chữ e' }] },
                { id: 4, question: 'Quần áo con mặc làm từ chất liệu gì?', options: [{ label: 'A', text: 'Gỗ' }, { label: 'B', text: 'Giấy' }, { label: 'C', text: 'Vải', isCorrect: true }] },
                { id: 5, question: 'Khi có cháy, chúng ta gọi số nào?', options: [{ label: 'A', text: '113' }, { label: 'B', text: '114', isCorrect: true }, { label: 'C', text: '115' }] },
                { id: 6, question: 'Người thầy dùng chân để viết chữ là ai?', options: [{ label: 'a', text: 'Nguyễn Ngọc Ngạn' }, { label: 'b', text: 'Nguyễn Ngọc Ký', isCorrect: true }, { label: 'c', text: 'Phạm Ngọc Ký' }] },
                { id: 7, question: 'Biển báo hình tròn đỏ, có vạch ngang trắng ở giữa có ý nghĩa gì?', options: [{ label: 'a', text: 'Được đi' }, { label: 'b', text: 'Dừng lại' }, { label: 'c', text: 'Cấm đi ngược chiều', isCorrect: true }] },
                { id: 8, question: 'Khi có tai nạn bị thương cần gọi cấp cứu thì gọi số nào?', options: [{ label: 'A', text: '113' }, { label: 'B', text: '114' }, { label: 'C', text: '115', isCorrect: true }] },
                { id: 9, question: 'Từ nào sau đây không chứa chữ cái "u"?', options: [{ label: 'A', text: 'Cúc áo' }, { label: 'B', text: 'Cái thìa', isCorrect: true }, { label: 'C', text: 'Cái tủ' }] },
                { id: 10, question: 'Bạn Gấu có 8 lọ mật ong, Gấu cho Thỏ 3 lọ, cho Khỉ 4 lọ. Hỏi bạn Gấu còn mấy lọ?', options: [{ label: 'A', text: '1 lọ', isCorrect: true }, { label: 'B', text: '2 lọ' }, { label: 'C', text: '3 lọ' }] },
                { id: 11, question: 'Thứ 2 hàng tuần các bạn nhỏ mầm non Sasuke có hoạt động gì?', options: [{ label: 'A', text: 'Kéo co' }, { label: 'B', text: 'Chào cờ', isCorrect: true }, { label: 'C', text: 'Dã ngoại' }] },
                { id: 12, question: 'Khi có kẻ trộm đột nhập chúng ta gọi số nào?', options: [{ label: 'A', text: '113', isCorrect: true }, { label: 'B', text: '114' }, { label: 'C', text: '115' }] },
                { id: 13, question: 'Thực phẩm nào sau đây cung cấp chất đạm?', options: [{ label: 'A', text: 'Thịt lợn', isCorrect: true }, { label: 'B', text: 'Cà chua' }, { label: 'C', text: 'Cơm' }] },
                { id: 14, question: 'Bà của Tích Chu biến thành con gì?', options: [{ label: 'a', text: 'Con Khỉ' }, { label: 'b', text: 'Con chim', isCorrect: true }, { label: 'c', text: 'Con sâu' }] },
                { id: 15, question: 'Vẽ chân dung là vẽ như thế nào?', options: [{ label: 'A', text: 'Vẽ phong cảnh' }, { label: 'B', text: 'Vẽ cả người' }, { label: 'C', text: 'Vẽ nửa người', isCorrect: true }] },
                { id: 16, question: 'Pha màu vàng với màu đỏ thì được màu gì?', options: [{ label: 'A', text: 'Màu xanh' }, { label: 'B', text: 'Màu cam', isCorrect: true }, { label: 'C', text: 'Màu đen' }] },
                { id: 17, question: 'Trong câu chuyện "Ba chú lợn con", anh lợn thứ 2 xây nhà bằng gì?', options: [{ label: 'A', text: 'Cỏ' }, { label: 'B', text: 'Gỗ', isCorrect: true }, { label: 'C', text: 'Gạch' }] },
                { id: 18, question: 'Cây nào sau đây cho củ?', options: [{ label: 'A', text: 'Cây đu đủ' }, { label: 'B', text: 'Cây xoài' }, { label: 'C', text: 'Cây khoai tây', isCorrect: true }] },
                { id: 19, question: 'Nghề xây dựng có đồ dùng gì?', options: [{ label: 'A', text: 'Cái kim' }, { label: 'B', text: 'Cái xẻng', isCorrect: true }, { label: 'C', text: 'Súng' }] },
                { id: 20, question: 'Kim dài chỉ số 12, kim ngắn chỉ số 1. Đồng hồ đang chỉ mấy giờ?', options: [{ label: 'A', text: '3 giờ' }, { label: 'B', text: '1 giờ', isCorrect: true }, { label: 'C', text: '5 giờ' }] },
                { type: 'end', title: 'XUẤT SẮC!', message: 'Bé đã hoàn thành 20 câu hỏi của Bộ Đề 3.' }
            ];

            const questionSlides = slides.filter(slide => slide.id);
            const totalQuestions = questionSlides.length;
            const answeredCount = Object.keys(answers).length;
            const currentCorrect = questionSlides.reduce((sum, slide) => {
                const userAnswer = answers[slide.id];
                if (userAnswer === undefined) return sum;
                const correctIndex = slide.options.findIndex(opt => opt.isCorrect);
                return sum + (userAnswer === correctIndex ? 1 : 0);
            }, 0);
            const percentCorrect = totalQuestions ? Math.round((currentCorrect / totalQuestions) * 100) : 0;

            const handleNext = useCallback(() => {
                if (currentSlide < slides.length - 1) {
                    setCurrentSlide(prev => prev + 1);
                    setShowAnswer(false);
                    setSelectedIdx(null);
                    if (document.activeElement instanceof HTMLElement) document.activeElement.blur();
                }
            }, [currentSlide, slides.length]);

            const handlePrev = useCallback(() => {
                if (currentSlide > 0) {
                    setCurrentSlide(prev => prev - 1);
                    setShowAnswer(false);
                    setSelectedIdx(null);
                    if (document.activeElement instanceof HTMLElement) document.activeElement.blur();
                }
            }, [currentSlide]);

            const handleSelect = (idx) => {
                if (showAnswer) return;
                if (slide && slide.id) {
                    setAnswers(prev => ({ ...prev, [slide.id]: idx }));
                }
                setSelectedIdx(idx);
                setShowAnswer(true);
            };

            const toggleAnswer = () => {
                setShowAnswer(prev => !prev);
                if (document.activeElement instanceof HTMLElement) document.activeElement.blur();
            };

            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === ' ') { e.preventDefault(); toggleAnswer(); }
                    if (e.key === 'ArrowRight') handleNext();
                    if (e.key === 'ArrowLeft') handlePrev();
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [handleNext, handlePrev]);

            const slide = slides[currentSlide];

            useEffect(() => {
                if (slide && slide.id && answers[slide.id] !== undefined) {
                    setSelectedIdx(answers[slide.id]);
                } else {
                    setSelectedIdx(null);
                }
                setShowAnswer(false);
            }, [currentSlide]);

            return (
                <div className="fixed inset-0 bg-slate-50 flex flex-col items-center justify-center p-4">
                    <div className="relative w-full h-full max-w-5xl max-h-[90vh] bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col transition-all">
                        {/* Progress Bar */}
                        <div className="absolute top-0 left-0 h-1.5 bg-red-100 w-full z-10">
                            <div className="h-full bg-red-500 transition-all duration-500" style={{ width: `${((currentSlide + 1) / slides.length) * 100}%` }} />
                        </div>

                        <div className="flex-1 p-6 md:p-12 flex flex-col justify-center slide-enter overflow-y-auto" key={currentSlide}>
                            <div className="stats-bar">
                                <div className="stat-card">
                                    <div className="stat-label">Tổng số câu</div>
                                    <div className="stat-value">{totalQuestions}</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Đã làm</div>
                                    <div className="stat-value">{answeredCount}</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Đúng hiện tại</div>
                                    <div className="stat-value">{currentCorrect}</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Tỷ lệ đúng</div>
                                    <div className="stat-value">{percentCorrect}%</div>
                                </div>
                            </div>
                            {slide.type === 'cover' ? (
                                <div className="text-center space-y-6">
                                    <h2 className="text-red-500 font-bold tracking-widest text-lg uppercase">{slide.org}</h2>
                                    <h1 className="text-4xl md:text-8xl font-black text-slate-900 leading-none">{slide.title}</h1>
                                    <p className="text-xl md:text-3xl text-slate-400 italic">{slide.subtitle}</p>
                                </div>
                            ) : slide.type === 'end' ? (
                                <div className="text-center space-y-8">
                                    <h1 className="text-6xl font-black text-green-600">XUẤT SẮC!</h1>
                                    <p className="text-2xl text-slate-500">{slide.message}</p>
                                    <button onClick={() => { setCurrentSlide(0); setShowAnswer(false); setSelectedIdx(null); setAnswers({}); }} className="px-10 py-5 bg-slate-900 text-white rounded-2xl font-bold text-xl active:scale-95">LÀM LẠI</button>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="space-y-2">
                                        <span className="bg-red-500 text-white px-3 py-1 rounded-full text-xs font-bold inline-block uppercase tracking-wider">CÂU {slide.id}</span>
                                        <h2 className="text-xl md:text-4xl font-bold text-slate-800 leading-snug">{slide.question}</h2>
                                    </div>
                                    <div className="grid gap-3">
                                        {slide.options.map((opt, i) => {
                                            const isSelected = selectedIdx === i;
                                            const isCorrect = opt.isCorrect;
                                            let style = "bg-slate-50 border-slate-100 text-slate-700";
                                            let icon = "bg-white text-slate-300";

                                            if (showAnswer) {
                                                if (isCorrect) {
                                                    style = "bg-green-500 border-green-600 text-white shadow-lg";
                                                    icon = "bg-white text-green-600";
                                                } else if (isSelected) {
                                                    style = "bg-red-500 border-red-600 text-white";
                                                    icon = "bg-white text-red-600";
                                                } else {
                                                    style = "bg-slate-50 border-slate-100 text-slate-300 opacity-40";
                                                }
                                            }

                                            return (
                                                <div key={i} onClick={() => handleSelect(i)} className={`p-4 md:p-6 rounded-2xl border-4 flex items-center transition-all cursor-pointer active:scale-[0.98] ${style}`}>
                                                    <div className={`w-10 h-10 md:w-14 md:h-14 rounded-full flex items-center justify-center font-black text-lg md:text-2xl mr-4 md:mr-6 flex-shrink-0 transition-all ${icon}`}>
                                                        {opt.label.toUpperCase()}
                                                    </div>
                                                    <span className="text-lg md:text-3xl font-bold leading-tight">{opt.text}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Navigation Controls */}
                        <div className="bg-white border-t border-slate-100 p-4 md:p-8 flex items-center justify-between w-full">
                            {/* Nút QUAY LẠI */}
                            <button 
                                onClick={handlePrev} 
                                disabled={currentSlide === 0} 
                                className="w-12 h-12 md:w-16 md:h-16 flex items-center justify-center bg-slate-100 rounded-2xl text-slate-600 disabled:opacity-10 active:scale-90 flex-shrink-0 shadow-sm"
                            >
                                <ChevronLeft/>
                            </button>

                            {/* Cụm trung tâm */}
                            <div className="flex flex-col md:flex-row items-center gap-2 md:gap-6">
                                <span className="text-slate-400 font-bold tabular-nums text-xs md:text-xl">
                                    {currentSlide + 1} / {slides.length}
                                </span>
                                {!slide.type && (
                                    <button 
                                        onClick={toggleAnswer} 
                                        className={`px-4 md:px-8 h-10 md:h-16 rounded-xl md:rounded-2xl font-black flex items-center text-[10px] md:text-xl transition-all shadow-md active:scale-90 ${showAnswer ? 'bg-orange-500 text-white' : 'bg-slate-900 text-white'}`}
                                    >
                                        <Eye/>
                                        <span className="ml-1 md:ml-2 whitespace-nowrap">{showAnswer ? 'ẨN ĐÁP ÁN' : 'XEM ĐÁP ÁN'}</span>
                                    </button>
                                )}
                            </div>

                            {/* Nút TIẾP THEO */}
                            <button 
                                onClick={handleNext} 
                                disabled={currentSlide === slides.length - 1} 
                                className="w-12 h-12 md:w-16 md:h-16 flex items-center justify-center bg-slate-100 rounded-2xl text-slate-600 disabled:opacity-10 active:scale-90 flex-shrink-0 shadow-sm"
                            >
                                <ChevronRight/>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
