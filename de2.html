<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sasuke Academy - Đề 2</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: Inter, Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #222;
      -webkit-user-select: none;
      user-select: none;
    }
    .container {
      max-width: 920px;
      margin: 24px auto;
      background: #fff;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }
    h1 { margin: 0 0 8px; font-size: 28px; line-height: 1.2; }
    .subtitle { color: #64748b; margin-bottom: 20px; font-size: 14px; }
    .topbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px;
    }
    .stat-label { color: #64748b; font-size: 13px; margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .question-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      background: #fff;
    }
    .question-number {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      color: #2563eb;
      background: #eff6ff;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
    }
    .question-title {
      font-weight: 700;
      margin-bottom: 14px;
      line-height: 1.6;
      font-size: 18px;
    }
    .options { display: grid; gap: 10px; }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }
    .option:hover { background: #f9fafb; }
    .option:active { transform: scale(0.998); }
    .option.correct {
      border-color: #dc2626;
      background: #fef2f2;
      color: #b91c1c;
    }
    .option.incorrect {
      border-color: #f59e0b;
      background: #fffbeb;
      color: #92400e;
    }
    .option input { margin-top: 3px; flex-shrink: 0; }
    .option-code { font-weight: 700; min-width: 24px; }
    .option-text { line-height: 1.5; }
    .question-status { margin-top: 12px; font-weight: 700; }
    .question-status.correct-text { color: #15803d; }
    .question-status.incorrect-text { color: #b91c1c; }
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    button {
      border: none;
      background: #2563eb;
      color: #fff;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #6b7280; }
    button:hover { opacity: 0.94; }
    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 14px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      display: none;
      line-height: 1.7;
    }
    @media (max-width: 720px) {
      .container { margin: 12px; padding: 16px; border-radius: 14px; }
      .topbar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .question-title { font-size: 17px; }
      .stat-value { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sasuke Academy - Đề 2</h1>
    <div class="subtitle">Bộ đề chuyển từ PDF sang HTML. Đáp án đúng được bôi đỏ khi nộp bài.</div>

    <div class="topbar">
      <div class="stat-box"><div class="stat-label">Tổng số câu</div><div class="stat-value" id="totalQuestions">0</div></div>
      <div class="stat-box"><div class="stat-label">Đã làm</div><div class="stat-value" id="answeredCount">0</div></div>
      <div class="stat-box"><div class="stat-label">Đúng hiện tại</div><div class="stat-value" id="scorePreview">0</div></div>
      <div class="stat-box"><div class="stat-label">Tỷ lệ đúng</div><div class="stat-value" id="percentPreview">0%</div></div>
    </div>

    <div id="quiz"></div>

    <div class="controls">
      <button onclick="submitQuiz()">Nộp bài</button>
      <button class="secondary" onclick="resetQuiz()">Làm lại</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    const OPTION_LABELS = ["A", "B", "C", "D", "E", "F"];
    const questions = [{"question": "1. Hãy chọn phép tính đúng:", "options": ["5 + 2 = 5", "7 + 0 = 0", "3 + 4 = 7"], "answer": 2}, {"question": "2. Trên cành có 9 con chim, bay đi 4 con. Hỏi còn mấy con?", "options": ["5 con", "6 con", "4 con"], "answer": 0}, {"question": "3. Chọn kết quả đúng: 9 - 6 + 3 = ?", "options": ["3", "6", "5"], "answer": 1}, {"question": "4. Vần uôi do mấy âm ghép lại:", "options": ["4 âm", "2 âm", "3 âm"], "answer": 2}, {"question": "5. Ngh chỉ viết trước các chữ:", "options": ["a, o, u", "i, y, ê", "e, ê, i"], "answer": 2}, {"question": "6. Bé cần làm gì để giữ gìn sức khỏe trong mùa dịch?", "options": ["Ăn nhiều, ngủ nhiều", "Ăn uống đầy đủ các chất dinh dưỡng, thường xuyên tập luyện thể thao, ngủ đúng giờ", "Bơi lội, đá banh, đá cầu, nhảy dây"], "answer": 1}, {"question": "7. Đâu là hành vi đúng?", "options": ["Bẻ cành hái hoa, dẫm lên cỏ", "Nhặt rác, phân loại rác đúng nơi quy định", "Xả nước tràn lan"], "answer": 1}, {"question": "8. Bé đi sang đường cần đi ở vị trí nào?", "options": ["Đi dưới lòng đường", "Đi dưới lòng đường có vạch kẻ trắng dành cho người đi bộ", "Đi bên phải, trên vỉa hè"], "answer": 1}, {"question": "9. Để giữ trường lớp xanh, sạch đẹp:", "options": ["Không vứt rác", "Không bứt hoa, bẻ cành", "Cả hai ý trên đều đúng"], "answer": 2}, {"question": "10. Để tránh ngộ độc thức ăn, em cần:", "options": ["Ăn quà vặt, hàng rong", "Ăn chín, uống sôi", "Ăn thức ăn để lâu ngày"], "answer": 1}, {"question": "11. Thức ăn giúp răng tốt:", "options": ["Bánh, kẹo", "Trái cây, sữa", "Nước ngọt"], "answer": 1}, {"question": "12. Ngậm nước có chứa fluoride để:", "options": ["Để sạch miệng", "Để răng mọc nhanh", "Để ngừa sâu răng"], "answer": 2}, {"question": "13. Người làm nghề cày cấy, trồng trọt trên đồng ruộng gọi là:", "options": ["Công nhân", "Kĩ sư", "Nông dân"], "answer": 2}, {"question": "14. Hồ Gươm ở địa danh nào của nước ta?", "options": ["Huế", "Hồ Chí Minh", "Hà Nội"], "answer": 2}, {"question": "15. Con trâu con gọi là con?", "options": ["Con nghé", "Con trâu bé", "Con trâu chấu"], "answer": 0}, {"question": "16. Bác sĩ chuyên khoa răng gọi là gì?", "options": ["Bác sĩ nha khoa", "Bác sĩ nhãn khoa", "Bác sĩ nhi khoa"], "answer": 0}, {"question": "17. Cá voi thở bằng gì?", "options": ["Phổi", "Mang", "Da"], "answer": 0}, {"question": "18. Tết cổ truyền Việt Nam là?", "options": ["Tết đoan ngọ", "Tết Trung thu", "Tết Nguyên đán"], "answer": 2}, {"question": "19. Khi tham gia giao thông đường bộ đèn tín hiệu nào bật lên thì sẽ dừng lại?", "options": ["Đèn đỏ", "Đèn vàng", "Đèn xanh"], "answer": 0}, {"question": "20. Tết trung thu còn được gọi là ngày tết gì?", "options": ["Tết đoàn viên, tết trông trăng, tết thiếu nhi", "Tết nguyên tiêu", "Tết chú Cuội – chị Hằng"], "answer": 0}];

    const quizEl = document.getElementById("quiz");
    const totalQuestionsEl = document.getElementById("totalQuestions");
    const answeredCountEl = document.getElementById("answeredCount");
    const scorePreviewEl = document.getElementById("scorePreview");
    const percentPreviewEl = document.getElementById("percentPreview");
    const resultEl = document.getElementById("result");

    function renderQuiz() {
      quizEl.innerHTML = "";
      totalQuestionsEl.textContent = questions.length;

      questions.forEach((q, qIndex) => {
        const card = document.createElement("div");
        card.className = "question-card";

        const number = document.createElement("div");
        number.className = "question-number";
        number.textContent = `Câu ${qIndex + 1}`;
        card.appendChild(number);

        const title = document.createElement("div");
        title.className = "question-title";
        title.textContent = q.question;
        card.appendChild(title);

        const optionsWrap = document.createElement("div");
        optionsWrap.className = "options";

        q.options.forEach((opt, oIndex) => {
          const label = document.createElement("label");
          label.className = "option";
          label.dataset.question = qIndex;
          label.dataset.option = oIndex;

          const input = document.createElement("input");
          input.type = "radio";
          input.name = `question-${qIndex}`;
          input.value = oIndex;
          input.addEventListener("change", updateProgress);

          const code = document.createElement("span");
          code.className = "option-code";
          code.textContent = `${OPTION_LABELS[oIndex] || oIndex + 1}.`;

          const text = document.createElement("span");
          text.className = "option-text";
          text.textContent = opt;

          label.appendChild(input);
          label.appendChild(code);
          label.appendChild(text);
          optionsWrap.appendChild(label);
        });

        const status = document.createElement("div");
        status.className = "question-status";
        status.id = `status-${qIndex}`;

        card.appendChild(optionsWrap);
        card.appendChild(status);
        quizEl.appendChild(card);
      });

      updateProgress();
    }

    function getSelectedAnswers() {
      return questions.map((_, qIndex) => {
        const selected = document.querySelector(`input[name="question-${qIndex}"]:checked`);
        return selected ? Number(selected.value) : null;
      });
    }

    function updateProgress() {
      const answers = getSelectedAnswers();
      const answeredCount = answers.filter(a => a !== null).length;
      answeredCountEl.textContent = answeredCount;

      let currentCorrect = 0;
      answers.forEach((a, i) => {
        if (a === questions[i].answer) currentCorrect++;
      });

      scorePreviewEl.textContent = currentCorrect;
      const percent = questions.length ? ((currentCorrect / questions.length) * 100).toFixed(0) : 0;
      percentPreviewEl.textContent = `${percent}%`;
    }

    function submitQuiz() {
      const answers = getSelectedAnswers();
      let score = 0;

      questions.forEach((q, qIndex) => {
        const labels = document.querySelectorAll(`label[data-question="${qIndex}"]`);
        const statusEl = document.getElementById(`status-${qIndex}`);
        const selected = answers[qIndex];

        labels.forEach(label => {
          const optionIndex = Number(label.dataset.option);
          label.classList.remove("correct", "incorrect");
          if (optionIndex === q.answer) {
            label.classList.add("correct");
          }
          if (selected !== null && optionIndex === selected && selected !== q.answer) {
            label.classList.add("incorrect");
          }
        });

        if (selected === q.answer) {
          score++;
          statusEl.textContent = "Đúng";
          statusEl.className = "question-status correct-text";
        } else if (selected === null) {
          statusEl.textContent = `Chưa chọn. Đáp án đúng là ${OPTION_LABELS[q.answer] || q.answer + 1}. ${q.options[q.answer]}`;
          statusEl.className = "question-status incorrect-text";
        } else {
          statusEl.textContent = `Sai. Đáp án đúng là ${OPTION_LABELS[q.answer] || q.answer + 1}. ${q.options[q.answer]}`;
          statusEl.className = "question-status incorrect-text";
        }
      });

      const percent = questions.length ? ((score / questions.length) * 100).toFixed(2) : "0.00";
      resultEl.style.display = "block";
      resultEl.innerHTML = `<strong>Kết quả:</strong> ${score}/${questions.length}<br><strong>Tỷ lệ đúng:</strong> ${percent}%`;
      scorePreviewEl.textContent = score;
      percentPreviewEl.textContent = `${Number(percent).toFixed(0)}%`;
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function resetQuiz() {
      renderQuiz();
      resultEl.style.display = "none";
      resultEl.innerHTML = "";
    }

    renderQuiz();
  </script>
</body>
</html>
